services:
  postgres:
    image: postgres:18
    container_name: walrus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-walrus_db}
      POSTGRES_USER: ${POSTGRES_USER:-walrus_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-walrus_app} -d ${POSTGRES_DB:-walrus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - walrus

  walrus-server:
    image: ${WALRUS_IMAGE:?set WALRUS_IMAGE in .env}:${WALRUS_TAG:-latest}
    container_name: walrus-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    command: ["--address", "0.0.0.0:3000"]
    environment:
      WALRUS_DB_USERNAME: ${POSTGRES_USER:-walrus_app}
      WALRUS_DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      WALRUS_DB_NAME: ${POSTGRES_DB:-walrus_db}
      WALRUS_DB_ADDRESS: postgres
    networks:
      - walrus

volumes:
  postgres_data:

networks:
  walrus:
    driver: bridge
