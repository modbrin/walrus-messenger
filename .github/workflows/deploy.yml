name: Build and Publish Image

on:
  push:
    tags:
      - '*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  verify-tag-version:
    name: Verify Tag Matches Crate Version
    runs-on: ubuntu-latest
    outputs:
      crate_version: ${{ steps.version.outputs.crate_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read crate version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          crate_version="$(sed -nE 's/^version = "(.*)"$/\1/p' crates/server/Cargo.toml | head -n1)"
          if [[ -z "${crate_version}" ]]; then
            echo "Failed to read crate version from crates/server/Cargo.toml" >&2
            exit 1
          fi
          echo "crate_version=${crate_version}" >> "${GITHUB_OUTPUT}"

      - name: Verify pushed tag
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          crate_version="${{ steps.version.outputs.crate_version }}"

          if [[ "${tag}" != "${crate_version}" && "${tag}" != "v${crate_version}" ]]; then
            echo "Tag '${tag}' does not match crate version '${crate_version}'." >&2
            echo "Use '${crate_version}' or 'v${crate_version}'." >&2
            exit 1
          fi

  build-and-push:
    needs:
      - verify-tag-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name and tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          image_name="ghcr.io/${owner_lc}/walrus"

          tags="${image_name}:${GITHUB_REF_NAME}"
          tags+=$'\n'"${image_name}:latest"

          {
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >>"${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
