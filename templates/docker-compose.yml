# Target path on server: /opt/walrus/docker-compose.yml
services:
  postgres:
    image: postgres:18
    container_name: walrus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-walrus_db}
      POSTGRES_USER: ${POSTGRES_USER:-walrus_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-walrus_app} -d ${POSTGRES_DB:-walrus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - walrus

  postgres-backup:
    image: postgres:18
    container_name: walrus-postgres-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-walrus_db}
      POSTGRES_USER: ${POSTGRES_USER:-walrus_app}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    command:
      - /bin/sh
      - -ec
      - |
        while true; do
          ts="$$(date -u +%Y%m%dT%H%M%SZ)";
          pg_dump -h postgres -U "$$POSTGRES_USER" -d "$$POSTGRES_DB" -F c -f "/backups/$${POSTGRES_DB}_$${ts}.dump";
          find /backups -type f -name '*.dump' -mtime "+$$BACKUP_RETENTION_DAYS" -delete;
          sleep "$$BACKUP_INTERVAL_SECONDS";
        done
    volumes:
      - postgres_backups:/backups
    networks:
      - walrus

  walrus-server:
    image: ghcr.io/modbrin/walrus:${WALRUS_TAG:-latest}
    container_name: walrus-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    command: ["--address", "0.0.0.0:3000"]
    environment:
      WALRUS_DB_USERNAME: ${POSTGRES_USER:-walrus_app}
      WALRUS_DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      WALRUS_DB_NAME: ${POSTGRES_DB:-walrus_db}
      WALRUS_DB_ADDRESS: postgres
      WALRUS_ORIGIN_PASSWORD: ${WALRUS_ORIGIN_PASSWORD:-}
    networks:
      - walrus

volumes:
  postgres_data:
  postgres_backups:

networks:
  walrus:
    driver: bridge
